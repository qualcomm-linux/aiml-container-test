actions:
- deploy:
    images:
      image:
        headers:
          Authorization: Q_S3_TOKEN
        url: "{{CONTAINER_URL}}"
    timeout:
      minutes: 200
    to: downloads
- deploy:
    images:
      image:
        headers:
          Authentication: Q_GITHUB_TOKEN
        url: "{{BUILD_DOWNLOAD_URL}}/flash-ufs.tar.gz"
      firmware:
        url: https://releases.linaro.org/96boards/dragonboard845c/qualcomm/firmware/RB3_firmware_20221121000000-v5.zip
    postprocess:
      docker:
        image: ghcr.io/foundriesio/lava-lmp-sign:main
        steps:
        - export IMAGE_PATH=$PWD
        - unzip RB3_firmware_20221121000000-v5.zip
        - cp 17-USB3-201-202-FW/K2026090.mem renesas_usb_fw.mem
        - cp overlay*.tar.gz overlay.tar.gz
        - tar xvf flash-ufs.tar.gz
        - virt-copy-in -a disk-ufs.img2 renesas_usb_fw.mem /lib/firmware/
        - rm flash-ufs.tar.gz
        - tar czvf flash-ufs.tar.gz disk-ufs*.img* flash_*
        - mkdir -p $IMAGE_PATH/overlay
        - tar --numeric-owner -xvf overlay.tar.gz -C $IMAGE_PATH/overlay
        - cp --reflink=auto aiml-container*tar ./container.tar
        - mv container.tar $IMAGE_PATH/overlay/lava-*/*/tests/*_container-test/ci/lava/definitions/
        - ( cd $IMAGE_PATH/overlay && tar --numeric-owner -zcvf $IMAGE_PATH/overlay.tar.gz . )
        - rm -rf $IMAGE_PATH/overlay
        - echo "OVERLAY=overlay.tar.gz" >> $IMAGE_PATH/flash.settings
        - echo "OVERLAY_PATH=/home/" >> $IMAGE_PATH/flash.settings
        - echo "ROOTFS_IMAGE=disk-ufs.img2" >> $IMAGE_PATH/flash.settings
        - echo "DEVICE_TYPE=debian-qcs6490-rb3gen2-vision-kit_ufs" >> $IMAGE_PATH/flash.settings
        - cat $IMAGE_PATH/flash.settings
    timeout:
      minutes: 200
    to: downloads
- deploy:
    images:
      image:
        url: downloads://flash-ufs.tar.gz
      settings:
        url: downloads://flash.settings
      overlay:
        url: downloads://overlay.tar.gz
    timeout:
      minutes: 5
    to: flasher
- boot:
    auto_login:
      login_prompt: 'login:'
      username: debian
      password_prompt: 'Password'
      password: debian
      login_commands:
      - "debian"
      - "new password"
      - "new password"
      - sudo su
    method: minimal
    prompts:
    - root@debian
    - debian@debian
    - "Current password"
    - "New password"
    - "Retype new password"
    timeout:
      minutes: 3
- command:
    name: network_turn_on
- test:
    definitions:
    - from: git
      name: "container-test"
      repository: https://github.com/qualcomm-linux/aiml-container-test
      branch: ci-staging
      path: ci/lava/definitions/container.yaml
      parameters:
        OCITARBALL: "container.tar"
        IMAGETAG: "aiml-container-test:latest"
        TESTS: "import-oci, run-oci, label_images, benchmark_model"
context:
  lava_test_results_dir: /home/lava-%s
  test_character_delay: 10
device_type: qcs6490
job_name: smoke tests {{GITHUB_REPOSITORY}} {{GITHUB_RUN_ID}}-{{GITHUB_RUN_ATTEMPT}}
metadata:
  build-commit: '{{GITHUB_SHA}}'
priority: 50
tags:
- cambridge-lab
timeouts:
  job:
    minutes: 210
visibility: public
