name: docker build
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    if: github.repository_owner == 'qualcomm-linux'
    runs-on: [ self-hosted, qcom-u2404, arm64 ]
    permissions:
      packages: write
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: https://ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build OCI tarball
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
      with:
        push: false
        platforms: linux/arm64
        provenance: mode=max
        tags: aiml-container-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=oci,dest=${{ runner.temp }}/aiml-container.tar

    - name: Build container and push to registry
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
      with:
        push: true
        platforms: linux/arm64
        provenance: mode=max
        tags: ghcr.io/qualcomm-linux/aiml-container-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

